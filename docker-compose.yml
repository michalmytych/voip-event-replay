services:
  api:
    build:
      context: ./api
    container_name: voip_api
    ports:
      - "8080:80"
    volumes:
      - ./api:/app
      - /app/var
      - /app/vendor
    environment:
      APP_ENV: dev
      SERVER_NAME: ":80"
      DATABASE_URL: "mysql://voip:voip@db:3306/voip_replay?serverVersion=8.4.0&charset=utf8mb4"
    depends_on:
      - db

  client:
    build:
      context: ./client
    container_name: voip_client
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "http://localhost:8080"
    command: npm run dev -- --host 0.0.0.0

  db:
    image: mysql:8.4
    container_name: voip_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: voip_replay
      MYSQL_USER: voip
      MYSQL_PASSWORD: voip
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: